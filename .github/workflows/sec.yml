name: Security Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gosec
        run: GOBIN="$(pwd)/bin/" go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: bin/gosec -terse ./...
